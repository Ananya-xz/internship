<!DOCTYPE html>
<html>
    <head>
        <title>positions</title>
        <link rel="stylesheet"href="position.css">
    </head>
    
    <body>

        <div class="content">
            <h2>badge on image</h2>
            
            <div class="image-container">
            <img src="https://via.placeholder.com/300"
            alt="image">

        </div>

        </div>

        <div class="image-container">

        </div>

        <div class="box fixed">Fixed</div>
