<!DOCTYPE html>
<html>
<head>
        <title>card design</title>

        <style>
            .card {
                width:300px;
                border:1px solid grey;
                padding:20px;
                margin:20px;
                border-radius:10px;
            }

            .card img {
                width:100%
                border-radius:10px;
            }

            .card h2 {
                margin-top:10px;
            }

            body {
                font-family:Arial;
            }
        </style>
</head>
<body>
        <div class="card">
            <img src="https://via.placeholder.com/300">
            <h2>My card</h2>
            <p>This is a simple card using box model spacing.</p>
        </div>
</body>
</html>
