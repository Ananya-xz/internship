<!DOCTYPE html>
<html>
    <head>
        <title>feedback form</title>
    </head>
    <body>
        <h1>Feedback form</h1>

        <form>
            <label>Your feedback:</label>
            <textarea name="feedback" rows="4" cols="30" placeholder="Enter your feedback" required></textarea><br><br>

            <label>Rating:</label>
            <select name="rating" required>
                <option>Excellent</option>
                <option>Good</option>
                <option>Average</option>
            </select><br><br>

            <button type="submit">Submit</button>
         </form>
    </body>
</html>
